# nginx vhost for verify.algovoi.co.uk
# Drop into /etc/nginx/sites-available/ on VM4, symlink to sites-enabled,
# then `nginx -t && systemctl reload nginx`.
#
# The upstream is the algovoi-verify-1 container on the algovoi-vm4 network,
# exposed on port 8000. We bind to a local Docker IP via container_name DNS
# (Docker's embedded DNS resolves container_name when nginx runs as a
# container on the same network) OR via the host bridge if nginx runs on
# the VM4 host directly (most common).

server {
    listen 80;
    listen [::]:80;
    server_name verify.algovoi.co.uk;

    # Cloudflare-only ACME challenge survival (HTTP-01) or just permanent
    # redirect everything to HTTPS. Cloudflare terminates TLS in front.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name verify.algovoi.co.uk;

    # Cloudflare origin certificate (managed separately; same pattern as
    # agent-trust-bench.algovoi.co.uk).
    ssl_certificate     /etc/nginx/ssl/algovoi-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/algovoi-origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Limit body size to match the in-app limit (5 MiB).
    client_max_body_size 6m;

    # Modest rate limiting to keep the service stateless under casual
    # exploration without spending real money. /verify is the only hot path.
    limit_req_zone $binary_remote_addr zone=verify:10m rate=10r/s;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Health probe -- no rate limiting so docker / monitoring can poll.
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # Index + docs -- unauthenticated.
    location = / {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Verify endpoint -- rate limited.
    location = /verify {
        limit_req zone=verify burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000/verify;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering on;
        proxy_read_timeout 30s;
    }

    # Reject everything else.
    location / {
        return 404;
    }
}
